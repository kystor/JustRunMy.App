name: 多账号面板自动测试

on:
  # 监听代码推送
  push:
    paths:
      - 'login_test.py' # 只有当这个文件发生更改并提交时，才触发工作流
  # 同时也保留手动触发按钮，方便调试
  workflow_dispatch:

jobs:
  test-login:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖和 Python 库
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          pip install seleniumbase

      - name: 执行多账号自动化测试脚本
        env:
          # 从 Secret 读取多账号配置
          TEST_ACCOUNTS: ${{ secrets.TEST_ACCOUNTS }}
        run: |
          # 使用 -u 参数确保输出不被缓存，能实时看到 Python 日志
          xvfb-run python -u login_test.py

      - name: 上传测试截图结果 (Artifacts)
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-result
          path: screenshots/
          retention-days: 7
